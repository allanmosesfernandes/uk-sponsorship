name: Refresh sponsorship data
run-name: Refresh sponsorship data
on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Step 5 — run your refresh script.
      - name: Run refresh script
        run: pnpm refresh

      - name: Commit and push if data changed
        run: |
          # configure a git identity (the runner has none by default)
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # stage everything in data/
          git add data/

          # gate: only commit + push if there's actually a staged diff
          if ! git diff --cached --quiet; then
            # include the gov.uk publish date in the message — it's in data/latest-updated.txt
            git commit -m "data: refresh ($(cat data/latest-updated.txt))"
            git push
          fi
